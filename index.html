<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Invoice Generator - Abdellah Aouf</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Invoices">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#1e293b">
  <meta name="robots" content="noindex, nofollow">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #e9ecef;
      color: #1a1a1a;
    }

    #app {
      display: flex;
      height: 100vh;
    }

    /* ── Form Panel ── */
    #form-panel {
      width: 400px;
      min-width: 400px;
      padding: 24px;
      overflow-y: auto;
      background: #f8f9fa;
      border-right: 1px solid #e0e0e0;
    }

    #form-panel h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
      margin-top: 24px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 4px;
    }

    .form-group input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    .form-group input:focus {
      border-color: #1e293b;
    }

    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row .form-group { flex: 1; }

    .job-card, .extra-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
    }

    .job-card .job-label {
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }

    .btn-remove {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border: none;
      background: #fee2e2;
      color: #dc2626;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .btn-remove:hover { background: #fecaca; }

    .btn-add {
      width: 100%;
      padding: 10px;
      border: 2px dashed #d1d5db;
      background: transparent;
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 8px;
    }

    .btn-add:hover {
      border-color: #1e293b;
      color: #1e293b;
    }

    .btn-generate {
      width: 100%;
      padding: 14px;
      background: #1e293b;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 24px;
    }

    .btn-generate:hover { background: #334155; }
    .btn-generate:disabled { background: #94a3b8; cursor: wait; }

    .btn-email {
      width: 100%;
      padding: 12px;
      background: white;
      color: #1e293b;
      font-size: 14px;
      font-weight: 700;
      border: 2px solid #1e293b;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      display: none;
    }

    .btn-email:hover { background: #f1f5f9; }

    /* ── Email Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      width: 480px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 20px;
    }

    .modal-field {
      margin-bottom: 16px;
    }

    .modal-field-label {
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .modal-field-value {
      font-size: 14px;
      color: #1a1a1a;
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 6px;
      border: 1px solid #e5e7eb;
    }

    .modal-field-value.body-preview {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 13px;
    }

    .modal-reminder {
      font-size: 13px;
      color: #b45309;
      background: #fef3c7;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
    }

    .modal-btn-send {
      flex: 1;
      padding: 12px;
      background: #1e293b;
      color: white;
      font-size: 14px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }

    .modal-btn-send:hover { background: #334155; }

    .modal-btn-cancel {
      padding: 12px 24px;
      background: #f1f5f9;
      color: #64748b;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
    }

    .modal-btn-cancel:hover { background: #e2e8f0; }

    /* ── Save Location ── */
    .save-location {
      margin-top: 24px;
      padding: 12px 16px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }

    .save-location-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .save-location-header .section-title {
      margin: 0;
    }

    .save-location-clear {
      font-size: 12px;
      color: #dc2626;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      text-decoration: underline;
    }

    .save-location-clear:hover { color: #b91c1c; }

    .save-location-path {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .save-location-path .folder-name {
      color: #1e293b;
      font-weight: 600;
    }

    .btn-choose-folder {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      background: white;
      color: #374151;
      font-size: 13px;
      font-weight: 600;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-choose-folder:hover { background: #f8f9fa; border-color: #1e293b; }

    .save-success {
      display: none;
      margin-top: 8px;
      padding: 8px 12px;
      background: #dcfce7;
      color: #166534;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    /* ── Preview Panel ── */
    #preview-panel {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    #invoice-content {
      width: 8.5in;
      min-height: 11in;
      background: white;
      padding: 48px 56px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #1a1a1a;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ── Invoice Styles ── */
    .inv-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .inv-sender-name {
      font-size: 18px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .inv-sender-detail {
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
    }

    .inv-title-block {
      text-align: center;
    }

    .inv-title {
      font-size: 40px;
      font-weight: 800;
      color: #1e293b;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .inv-meta {
      text-align: right;
    }

    .inv-meta table {
      margin-left: auto;
      border-collapse: collapse;
    }

    .inv-meta td {
      padding: 2px 0;
      font-size: 12px;
    }

    .inv-meta-label {
      font-weight: 700;
      color: #64748b;
      padding-right: 12px;
      text-align: right;
    }

    .inv-meta-value {
      color: #1e293b;
      text-align: right;
    }

    .inv-divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 16px 0;
    }

    .inv-billto {
      display: flex;
      gap: 40px;
      margin-bottom: 24px;
    }

    .inv-billto-label {
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
      min-width: 80px;
    }

    .inv-billto-company {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .inv-billto-detail {
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
    }

    .inv-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 0;
    }

    .inv-table thead th {
      font-size: 13px;
      font-weight: 700;
      color: #1e293b;
      background: #f1f5f9;
      padding: 10px 16px;
      text-align: left;
    }

    .inv-table thead th.col-amount {
      text-align: right;
    }

    .inv-table tbody td {
      padding: 16px;
      vertical-align: top;
      border-bottom: 1px solid #e5e7eb;
    }

    .inv-table tbody td.col-amount {
      text-align: right;
      white-space: nowrap;
      font-size: 14px;
    }

    .inv-job-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 2px;
    }

    .inv-job-address {
      font-size: 13px;
      color: #64748b;
    }

    .inv-totals {
      width: 100%;
      border-collapse: collapse;
    }

    .inv-totals td {
      padding: 8px 16px;
      font-size: 14px;
    }

    .inv-totals .subtotal-label {
      text-align: left;
      color: #64748b;
    }

    .inv-totals .subtotal-amount {
      text-align: right;
      color: #64748b;
    }

    .inv-totals .total-label {
      text-align: left;
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
      border-bottom: 3px solid #1e293b;
      padding-top: 8px;
      padding-bottom: 12px;
    }

    .inv-totals .total-amount {
      text-align: right;
      font-size: 16px;
      font-weight: 700;
      color: #1e293b;
      border-bottom: 3px solid #1e293b;
      padding-top: 8px;
      padding-bottom: 12px;
    }

    .inv-notes {
      margin-top: 32px;
    }

    .inv-notes-title {
      font-size: 15px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 8px;
    }

    .inv-notes-body {
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }

    .inv-footer {
      margin-top: auto;
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #9ca3af;
    }

    /* ── Login Screen ── */
    #login-screen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #login-screen.hidden { display: none; }

    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      width: 360px;
      max-width: 90vw;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      text-align: center;
    }

    .login-card h2 {
      font-size: 22px;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 6px;
    }

    .login-card p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      margin-bottom: 16px;
      transition: border-color 0.15s;
    }

    .login-card input:focus { border-color: #1e293b; }

    .login-card button {
      width: 100%;
      padding: 14px;
      background: #1e293b;
      color: white;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
    }

    .login-card button:hover { background: #334155; }

    .login-error {
      color: #dc2626;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      display: none;
    }

    .btn-logout {
      border: none;
      background: none;
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      text-decoration: underline;
    }

    .btn-logout:hover { color: #dc2626; }

    /* ── Print ── */
    @media print {
      #form-panel { display: none !important; }
      #preview-panel { padding: 0; background: white; }
      #invoice-content { box-shadow: none; margin: 0; }
      body { background: white; }
    }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      #app { flex-direction: column; height: auto; min-height: 100vh; }
      #form-panel {
        width: 100%;
        min-width: 0;
        border-right: none;
        padding: 20px 16px;
        padding-bottom: 100px;
      }
      #preview-panel { display: none; }

      #form-panel h1 { font-size: 22px; text-align: center; }

      .form-group input {
        padding: 12px;
        font-size: 16px;
        border-radius: 8px;
      }

      .btn-remove {
        width: 36px;
        height: 36px;
        font-size: 22px;
      }

      .btn-add {
        padding: 14px;
        font-size: 16px;
      }

      .btn-generate {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        margin: 0;
        border-radius: 0;
        padding: 18px;
        font-size: 18px;
        z-index: 100;
      }

      .btn-email {
        position: fixed;
        bottom: 60px;
        left: 0;
        right: 0;
        margin: 0;
        border-radius: 0;
        border-left: none;
        border-right: none;
        padding: 14px;
        font-size: 16px;
        z-index: 100;
        background: white;
      }

      .save-location { display: none; }

      .modal-card {
        padding: 20px;
        margin: 16px;
        max-height: 90vh;
        overflow-y: auto;
      }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-card">
      <h2>Invoice Generator</h2>
      <p>Enter password to continue</p>
      <div class="login-error" id="login-error">Incorrect password</div>
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
      <button onclick="attemptLogin()">Login</button>
    </div>
  </div>

  <div id="app" style="display:none;">
    <!-- Form Panel -->
    <div id="form-panel">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h1 style="margin-bottom:0;">Invoice Generator</h1>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>

      <div class="section-title">Invoice Settings</div>
      <div class="form-row">
        <div class="form-group">
          <label>Invoice Date</label>
          <input type="date" id="invoiceDate">
        </div>
        <div class="form-group">
          <label>Due Date</label>
          <input type="date" id="dueDate">
        </div>
      </div>
      <div class="form-group">
        <label>Invoice #</label>
        <input type="text" id="invoiceNumber">
      </div>

      <div class="section-title">Jobs</div>
      <div id="jobs-container"></div>
      <button class="btn-add" onclick="addJob()">+ Add Job</button>

      <div class="section-title">Extra Items</div>
      <div id="extras-container"></div>
      <button class="btn-add" onclick="addExtraItem()">+ Add Extra Item</button>

      <div class="save-location" id="save-location-section">
        <div class="save-location-header">
          <div class="section-title" style="margin-top:0">Save Location</div>
          <button class="save-location-clear" id="btn-clear-folder" onclick="clearSaveFolder()" style="display:none">Clear</button>
        </div>
        <div class="save-location-path" id="save-folder-display">
          Downloads folder (default)
        </div>
        <button class="btn-choose-folder" id="btn-choose-folder" onclick="chooseSaveFolder()">Choose Folder</button>
        <div class="save-success" id="save-success">Saved!</div>
      </div>

      <button class="btn-generate" id="btn-generate" onclick="generatePDF()">Generate PDF</button>
      <button class="btn-email" id="btn-email" onclick="showEmailModal()">Send via Email</button>
    </div>

    <!-- Email Confirmation Modal -->
    <div class="modal-overlay" id="email-modal">
      <div class="modal-card">
        <div class="modal-title">Send Invoice via Email</div>
        <div class="modal-field">
          <div class="modal-field-label">From</div>
          <div class="modal-field-value">anasx994@outlook.com</div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">To</div>
          <div class="modal-field-value" id="modal-to"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Subject</div>
          <div class="modal-field-value" id="modal-subject"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Body</div>
          <div class="modal-field-value body-preview" id="modal-body"></div>
        </div>
        <div class="modal-reminder">Don't forget to attach the PDF file to the email.</div>
        <div class="modal-buttons">
          <button class="modal-btn-send" onclick="openEmail()">Open Email</button>
          <button class="modal-btn-cancel" onclick="closeEmailModal()">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Preview Panel -->
    <div id="preview-panel">
      <div id="invoice-content"></div>
    </div>
  </div>

  <script>
    // ── Authentication ──
    var PASSWORD_HASH = '3fc09488bae7500091b0e059e880173e659732599a68602a564e978fbf0f22b5';

    function hashPassword(password) {
      var encoder = new TextEncoder();
      var data = encoder.encode(password);
      return crypto.subtle.digest('SHA-256', data).then(function(buffer) {
        var array = Array.from(new Uint8Array(buffer));
        return array.map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
      });
    }

    function attemptLogin() {
      var password = document.getElementById('login-password').value;
      hashPassword(password).then(function(hash) {
        if (hash === PASSWORD_HASH) {
          localStorage.setItem('invoice_auth', hash);
          showApp();
        } else {
          document.getElementById('login-error').style.display = 'block';
          document.getElementById('login-password').value = '';
          document.getElementById('login-password').focus();
        }
      });
    }

    function showApp() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').style.display = 'flex';
    }

    function logout() {
      localStorage.removeItem('invoice_auth');
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('app').style.display = 'none';
      document.getElementById('login-password').value = '';
      document.getElementById('login-error').style.display = 'none';
    }

    // Check if already logged in
    (function() {
      if (localStorage.getItem('invoice_auth') === PASSWORD_HASH) {
        showApp();
      }
    })();

    // Allow Enter key to submit login
    document.getElementById('login-password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') attemptLogin();
    });

    // ── State ──
    let jobCounter = 0;
    let itemCounter = 0;
    let dueDateManuallyEdited = false;
    let invoiceNumberManuallyEdited = false;
    let savedDirHandle = null;

    // ── IndexedDB for folder handle persistence ──
    function openDB() {
      return new Promise(function(resolve, reject) {
        var request = indexedDB.open('InvoiceGeneratorDB', 1);
        request.onupgradeneeded = function(e) {
          e.target.result.createObjectStore('settings');
        };
        request.onsuccess = function(e) { resolve(e.target.result); };
        request.onerror = function(e) { reject(e.target.error); };
      });
    }

    function saveDirHandle(handle) {
      return openDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction('settings', 'readwrite');
          tx.objectStore('settings').put(handle, 'dirHandle');
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function(e) { reject(e.target.error); };
        });
      });
    }

    function loadDirHandle() {
      return openDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction('settings', 'readonly');
          var request = tx.objectStore('settings').get('dirHandle');
          request.onsuccess = function(e) { resolve(e.target.result || null); };
          request.onerror = function() { resolve(null); };
        });
      });
    }

    function deleteDirHandle() {
      return openDB().then(function(db) {
        return new Promise(function(resolve, reject) {
          var tx = db.transaction('settings', 'readwrite');
          tx.objectStore('settings').delete('dirHandle');
          tx.oncomplete = function() { resolve(); };
          tx.onerror = function() { resolve(); };
        });
      });
    }

    // ── Folder Picker ──
    function updateFolderUI() {
      var display = document.getElementById('save-folder-display');
      var clearBtn = document.getElementById('btn-clear-folder');
      var chooseBtn = document.getElementById('btn-choose-folder');

      if (savedDirHandle) {
        display.innerHTML = 'Saving to: <span class="folder-name">' + escapeHTML(savedDirHandle.name) + '</span>';
        clearBtn.style.display = 'inline';
        chooseBtn.textContent = 'Change Folder';
      } else {
        display.textContent = 'Downloads folder (default)';
        clearBtn.style.display = 'none';
        chooseBtn.textContent = 'Choose Folder';
      }

      // Hide the section entirely if the API is not available
      if (!window.showDirectoryPicker) {
        document.getElementById('save-location-section').style.display = 'none';
      }
    }

    function chooseSaveFolder() {
      if (!window.showDirectoryPicker) {
        alert('Your browser does not support this feature. Please use Google Chrome.');
        return;
      }
      window.showDirectoryPicker({ mode: 'readwrite' }).then(function(handle) {
        savedDirHandle = handle;
        saveDirHandle(handle);
        updateFolderUI();
      }).catch(function(err) {
        // User cancelled the picker — do nothing
        if (err.name !== 'AbortError') {
          console.error('Folder picker error:', err);
        }
      });
    }

    function clearSaveFolder() {
      savedDirHandle = null;
      deleteDirHandle();
      updateFolderUI();
    }

    // ── Utilities ──
    function formatDateLong(dateStr) {
      if (!dateStr) return '';
      const date = new Date(dateStr + 'T00:00:00');
      const months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
      return months[date.getMonth()] + ' ' + date.getDate() + ', ' + date.getFullYear();
    }

    function formatCurrency(amount) {
      return '$' + amount.toLocaleString('en-CA', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function generateInvoiceNumber(dateStr) {
      if (!dateStr) return 'INV-00000000-001';
      const date = new Date(dateStr + 'T00:00:00');
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return 'INV-' + y + m + d + '-001';
    }

    // ── Initialization ──
    document.addEventListener('DOMContentLoaded', function() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, '0');
      const dd = String(today.getDate()).padStart(2, '0');
      const todayStr = yyyy + '-' + mm + '-' + dd;

      document.getElementById('invoiceDate').value = todayStr;

      const due = new Date(today);
      due.setDate(due.getDate() + 14);
      const dueYYYY = due.getFullYear();
      const dueMM = String(due.getMonth() + 1).padStart(2, '0');
      const dueDD = String(due.getDate()).padStart(2, '0');
      document.getElementById('dueDate').value = dueYYYY + '-' + dueMM + '-' + dueDD;

      document.getElementById('invoiceNumber').value = generateInvoiceNumber(todayStr);

      // Event listeners
      document.getElementById('invoiceDate').addEventListener('change', function() {
        if (!invoiceNumberManuallyEdited) {
          document.getElementById('invoiceNumber').value = generateInvoiceNumber(this.value);
        }
        if (!dueDateManuallyEdited) {
          const invDate = new Date(this.value + 'T00:00:00');
          invDate.setDate(invDate.getDate() + 14);
          const dy = invDate.getFullYear();
          const dm = String(invDate.getMonth() + 1).padStart(2, '0');
          const ddd = String(invDate.getDate()).padStart(2, '0');
          document.getElementById('dueDate').value = dy + '-' + dm + '-' + ddd;
        }
        renderPreview();
      });

      document.getElementById('dueDate').addEventListener('change', function() {
        dueDateManuallyEdited = true;
        renderPreview();
      });

      document.getElementById('invoiceNumber').addEventListener('input', function() {
        invoiceNumberManuallyEdited = true;
        renderPreview();
      });

      addJob();
      renderPreview();

      // Load saved folder handle
      loadDirHandle().then(function(handle) {
        if (handle) {
          savedDirHandle = handle;
        }
        updateFolderUI();
      }).catch(function() {
        updateFolderUI();
      });
    });

    // ── Job Management ──
    function addJob() {
      jobCounter++;
      const jobId = jobCounter;
      const container = document.getElementById('jobs-container');

      const card = document.createElement('div');
      card.className = 'job-card';
      card.dataset.jobId = jobId;
      card.innerHTML =
        '<button class="btn-remove" onclick="removeJob(' + jobId + ')" title="Remove job">&times;</button>' +
        '<div class="job-label">Job ' + document.querySelectorAll('.job-card').length + 1 + '</div>' +
        '<div class="form-group">' +
          '<label>Client Name</label>' +
          '<input type="text" class="job-client" placeholder="e.g. Gordon Zans" oninput="renderPreview()">' +
        '</div>' +
        '<div class="form-group">' +
          '<label>Street Address</label>' +
          '<input type="text" class="job-street" placeholder="e.g. 1630 Country Walk Dr." oninput="renderPreview()">' +
        '</div>' +
        '<div class="form-group">' +
          '<label>City, Province, Postal Code</label>' +
          '<input type="text" class="job-city" placeholder="e.g. Ottawa, ON K1C 8E2" value="Ottawa, ON " oninput="renderPreview()">' +
        '</div>' +
        '<div class="form-group">' +
          '<label>Amount ($)</label>' +
          '<input type="number" class="job-amount" placeholder="0.00" step="0.01" min="0" oninput="renderPreview()">' +
        '</div>';

      container.appendChild(card);
      updateJobLabels();

      card.querySelector('.job-client').focus();
    }

    function removeJob(jobId) {
      const card = document.querySelector('.job-card[data-job-id="' + jobId + '"]');
      if (card) card.remove();
      updateJobLabels();
      updateRemoveButtons();
      renderPreview();
    }

    function updateJobLabels() {
      const cards = document.querySelectorAll('.job-card');
      cards.forEach(function(card, i) {
        card.querySelector('.job-label').textContent = 'Job ' + (i + 1);
      });
    }

    function updateRemoveButtons() {
      const cards = document.querySelectorAll('.job-card');
      cards.forEach(function(card) {
        card.querySelector('.btn-remove').style.display = cards.length > 1 ? 'flex' : 'none';
      });
    }

    // ── Extra Items Management ──
    function addExtraItem() {
      itemCounter++;
      const itemId = itemCounter;
      const container = document.getElementById('extras-container');

      const card = document.createElement('div');
      card.className = 'extra-card';
      card.dataset.itemId = itemId;
      card.innerHTML =
        '<button class="btn-remove" onclick="removeExtraItem(' + itemId + ')" title="Remove item">&times;</button>' +
        '<div class="form-row">' +
          '<div class="form-group" style="flex:2">' +
            '<label>Description</label>' +
            '<input type="text" class="extra-desc" placeholder="e.g. Paint supplies" oninput="renderPreview()">' +
          '</div>' +
          '<div class="form-group" style="flex:1">' +
            '<label>Amount ($)</label>' +
            '<input type="number" class="extra-amount" placeholder="0.00" step="0.01" min="0" oninput="renderPreview()">' +
          '</div>' +
        '</div>';

      container.appendChild(card);
      renderPreview();
      card.querySelector('.extra-desc').focus();
    }

    function removeExtraItem(itemId) {
      const card = document.querySelector('.extra-card[data-item-id="' + itemId + '"]');
      if (card) card.remove();
      renderPreview();
    }

    // ── Preview Rendering ──
    function renderPreview() {
      const invoiceNum = document.getElementById('invoiceNumber').value || '';
      const invoiceDateRaw = document.getElementById('invoiceDate').value || '';
      const dueDateRaw = document.getElementById('dueDate').value || '';

      const invoiceDateFormatted = formatDateLong(invoiceDateRaw);
      const dueDateFormatted = formatDateLong(dueDateRaw);

      // Collect jobs
      var jobs = [];
      var jobNum = 1;
      document.querySelectorAll('.job-card').forEach(function(card) {
        jobs.push({
          num: jobNum++,
          client: card.querySelector('.job-client').value.trim(),
          street: card.querySelector('.job-street').value.trim(),
          city: card.querySelector('.job-city').value.trim(),
          amount: parseFloat(card.querySelector('.job-amount').value) || 0
        });
      });

      // Collect extras
      var extras = [];
      document.querySelectorAll('.extra-card').forEach(function(card) {
        extras.push({
          desc: card.querySelector('.extra-desc').value.trim(),
          amount: parseFloat(card.querySelector('.extra-amount').value) || 0
        });
      });

      // Calculate total
      var subtotal = 0;
      jobs.forEach(function(j) { subtotal += j.amount; });
      extras.forEach(function(e) { subtotal += e.amount; });

      // Build job rows
      var jobRows = '';
      jobs.forEach(function(j) {
        jobRows +=
          '<tr>' +
            '<td style="padding:16px;vertical-align:top;border-bottom:1px solid #e5e7eb;">' +
              '<div class="inv-job-title">Job ' + j.num + ': ' + (j.client || '—') + '</div>' +
              (j.street ? '<div class="inv-job-address">' + escapeHTML(j.street) + '</div>' : '') +
              (j.city ? '<div class="inv-job-address">' + escapeHTML(j.city) + '</div>' : '') +
            '</td>' +
            '<td class="col-amount" style="padding:16px;vertical-align:top;border-bottom:1px solid #e5e7eb;text-align:right;white-space:nowrap;">' +
              formatCurrency(j.amount) +
            '</td>' +
          '</tr>';
      });

      // Build extra rows
      var extraRows = '';
      extras.forEach(function(e) {
        extraRows +=
          '<tr>' +
            '<td style="padding:12px 16px;border-bottom:1px solid #e5e7eb;">' + escapeHTML(e.desc || '—') + '</td>' +
            '<td style="padding:12px 16px;border-bottom:1px solid #e5e7eb;text-align:right;white-space:nowrap;">' +
              formatCurrency(e.amount) +
            '</td>' +
          '</tr>';
      });

      var html =
        // Header
        '<div class="inv-header">' +
          '<div>' +
            '<div class="inv-sender-name">Abdellah Aouf</div>' +
            '<div class="inv-sender-detail">(343) 202-3929</div>' +
            '<div class="inv-sender-detail">aouf0002@algonquinlive.com</div>' +
          '</div>' +
          '<div class="inv-title-block">' +
            '<div class="inv-title">INVOICE</div>' +
          '</div>' +
          '<div class="inv-meta">' +
            '<table>' +
              '<tr><td class="inv-meta-label">Invoice #</td><td class="inv-meta-value">' + escapeHTML(invoiceNum) + '</td></tr>' +
              '<tr><td class="inv-meta-label">Invoice Date</td><td class="inv-meta-value">' + escapeHTML(invoiceDateFormatted) + '</td></tr>' +
              '<tr><td class="inv-meta-label">Due Date</td><td class="inv-meta-value">' + escapeHTML(dueDateFormatted) + '</td></tr>' +
            '</table>' +
          '</div>' +
        '</div>' +

        // Divider
        '<hr class="inv-divider">' +

        // Bill To
        '<div class="inv-billto">' +
          '<div class="inv-billto-label">Bill To</div>' +
          '<div>' +
            '<div class="inv-billto-company">Ottawa Painters</div>' +
            '<div class="inv-billto-detail">License# 767449168 RT0001</div>' +
            '<div class="inv-billto-detail">2377 Walkley Rd</div>' +
            '<div class="inv-billto-detail">Ottawa, ON K1G 3H1</div>' +
            '<div class="inv-billto-detail">(613) 801-8262</div>' +
          '</div>' +
        '</div>' +

        // Items Table
        '<table class="inv-table">' +
          '<thead>' +
            '<tr>' +
              '<th>Description</th>' +
              '<th class="col-amount">Amount (CAD)</th>' +
            '</tr>' +
          '</thead>' +
          '<tbody>' +
            jobRows +
            extraRows +
          '</tbody>' +
        '</table>' +

        // Totals
        '<table class="inv-totals">' +
          '<tr>' +
            '<td class="subtotal-label">Subtotal</td>' +
            '<td class="subtotal-amount">' + formatCurrency(subtotal) + '</td>' +
          '</tr>' +
          '<tr>' +
            '<td class="total-label">Total</td>' +
            '<td class="total-amount">' + formatCurrency(subtotal) + '</td>' +
          '</tr>' +

        // Notes
        '<div class="inv-notes">' +
          '<div class="inv-notes-title">Notes / Terms</div>' +

        '</div>' +

        // Footer
        '<div class="inv-footer">' +
          '<span>Abdellah Aouf &bull; (343) 202-3929 &bull; aouf0002@algonquinlive.com &bull; Invoice ' + escapeHTML(invoiceNum) + '</span>' +
          '<span>Page 1</span>' +
        '</div>';

      document.getElementById('invoice-content').innerHTML = html;
    }

    function escapeHTML(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── PDF Generation ──
    function showSaveSuccess(folderName) {
      var el = document.getElementById('save-success');
      el.textContent = 'Saved to ' + folderName + '!';
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 3000);
    }

    function generatePDF() {
      var element = document.getElementById('invoice-content');
      var invoiceNum = document.getElementById('invoiceNumber').value || 'invoice';
      var filename = invoiceNum + '.pdf';

      var opt = {
        margin:       0,
        filename:     filename,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' },
        pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
      };

      var btn = document.getElementById('btn-generate');
      var originalText = btn.textContent;
      btn.textContent = 'Generating...';
      btn.disabled = true;

      if (savedDirHandle) {
        // Save directly to chosen folder
        savedDirHandle.requestPermission({ mode: 'readwrite' }).then(function(permission) {
          if (permission !== 'granted') {
            throw new Error('Permission denied');
          }
          return html2pdf().set(opt).from(element).outputPdf('blob');
        }).then(function(blob) {
          return savedDirHandle.getFileHandle(filename, { create: true }).then(function(fileHandle) {
            return fileHandle.createWritable().then(function(writable) {
              return writable.write(blob).then(function() {
                return writable.close();
              });
            });
          });
        }).then(function() {
          btn.textContent = originalText;
          btn.disabled = false;
          showSaveSuccess(savedDirHandle.name);
          document.getElementById('btn-email').style.display = 'block';
        }).catch(function(err) {
          console.error('Save to folder failed:', err);
          btn.textContent = originalText;
          btn.disabled = false;
          // If permission was revoked or folder is gone, clear and fall back
          if (err.message === 'Permission denied' || err.name === 'NotFoundError') {
            savedDirHandle = null;
            deleteDirHandle();
            updateFolderUI();
            alert('Folder access was denied. Falling back to normal download.');
            html2pdf().set(opt).from(element).save();
          } else {
            alert('Error saving PDF: ' + err.message);
          }
        });
      } else {
        // Fall back to normal download
        html2pdf().set(opt).from(element).save().then(function() {
          btn.textContent = originalText;
          btn.disabled = false;
          document.getElementById('btn-email').style.display = 'block';
        }).catch(function() {
          btn.textContent = originalText;
          btn.disabled = false;
          alert('Error generating PDF. Make sure you have an internet connection.');
        });
      }
    }
    // ── Email ──
    var EMAIL_TO = 'info@paintersottawa.com';
    var pdfGenerated = false;

    function getInvoiceTotal() {
      var total = 0;
      document.querySelectorAll('.job-card').forEach(function(card) {
        total += parseFloat(card.querySelector('.job-amount').value) || 0;
      });
      document.querySelectorAll('.extra-card').forEach(function(card) {
        total += parseFloat(card.querySelector('.extra-amount').value) || 0;
      });
      return total;
    }

    function showEmailModal() {
      var invoiceNum = document.getElementById('invoiceNumber').value || '';
      var dueDateRaw = document.getElementById('dueDate').value || '';
      var dueDateFormatted = formatDateLong(dueDateRaw);
      var total = formatCurrency(getInvoiceTotal());

      var subject = 'Invoice ' + invoiceNum + ' - Abdellah Aouf';
      var body = 'Hi,\n\nPlease find attached invoice ' + invoiceNum + ' for the amount of ' + total + ', due on ' + dueDateFormatted + '.\n\nThank you,\nAbdellah Aouf\n(343) 202-3929';

      document.getElementById('modal-to').textContent = EMAIL_TO;
      document.getElementById('modal-subject').textContent = subject;
      document.getElementById('modal-body').textContent = body;

      document.getElementById('email-modal').classList.add('active');
    }

    function closeEmailModal() {
      document.getElementById('email-modal').classList.remove('active');
    }

    function openEmail() {
      var invoiceNum = document.getElementById('invoiceNumber').value || '';
      var dueDateRaw = document.getElementById('dueDate').value || '';
      var dueDateFormatted = formatDateLong(dueDateRaw);
      var total = formatCurrency(getInvoiceTotal());

      var subject = 'Invoice ' + invoiceNum + ' - Abdellah Aouf';
      var body = 'Hi,\n\nPlease find attached invoice ' + invoiceNum + ' for the amount of ' + total + ', due on ' + dueDateFormatted + '.\n\nThank you,\nAbdellah Aouf\n(343) 202-3929';

      var url = 'https://outlook.live.com/mail/0/deeplink/compose' +
        '?to=' + encodeURIComponent(EMAIL_TO) +
        '&subject=' + encodeURIComponent(subject) +
        '&body=' + encodeURIComponent(body);

      window.open(url, '_blank');
      closeEmailModal();
    }

    // Close modal on overlay click
    document.getElementById('email-modal').addEventListener('click', function(e) {
      if (e.target === this) closeEmailModal();
    });

    // ── Service Worker ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function() {});
    }
  </script>
